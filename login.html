<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | THE CHAMPIONS ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF9933',
                        secondary: '#138808',
                        navy: '#000080',
                        dark: '#1A1A2E',
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="index.css" rel="stylesheet">
    <style>
        body { padding-top: 0 !important; background: linear-gradient(135deg, #1A1A2E 0%, #000080 50%, #1A1A2E 100%); }
        .login-card { backdrop-filter: blur(20px); background: rgba(255,255,255,0.95); }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 16px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; transform: translateX(400px); transition: transform 0.4s ease; }
        .toast.show { transform: translateX(0); }
        .toast-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .toast-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(255,153,51,0.15); }
        .demo-badge { background: linear-gradient(135deg, #FF9933, #FF6600); animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 10px rgba(255,153,51,0.3); } 50% { box-shadow: 0 0 25px rgba(255,153,51,0.6); } }
    </style>

    <style>html, body { overflow-x: hidden; width: 100%; max-width: 100%; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-body overflow-x-hidden">
    <!-- Toast Container -->
    <div id="toast" class="toast"></div>

    <div class="max-w-md w-full">
        <!-- Demo Credentials Badge -->
        <div class="demo-badge text-white text-center p-4 rounded-2xl mb-6 shadow-xl">
            <p class="text-xs font-bold uppercase tracking-widest mb-1">🔑 Demo Credentials</p>
            <p class="text-sm opacity-90">Admin: <b>admin@champions.com</b> / <b>admin123</b></p>
            <p class="text-sm opacity-90">Student: <b>student@champions.com</b> / <b>student123</b></p>
        </div>

        <div class="login-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-navy p-8 text-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-10">
                    <div class="absolute w-40 h-40 rounded-full bg-primary -top-10 -right-10"></div>
                    <div class="absolute w-24 h-24 rounded-full bg-secondary -bottom-6 -left-6"></div>
                </div>
                <a href="index.html"><img src="assets/images/logo.png" alt="Logo" class="h-14 mx-auto mb-4 relative z-10"></a>
                <h1 class="text-2xl font-heading font-bold text-white uppercase tracking-wider relative z-10">Login</h1>
                <p class="text-blue-200 text-sm mt-2 relative z-10">Welcome back to the academy</p>
            </div>

            <!-- Role Toggle -->
            <div class="flex bg-gray-50 p-1 m-6 mb-0 rounded-xl">
                <button id="studentTab" onclick="setRole('student')" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-navy text-white shadow">🎓 Student</button>
                <button id="adminTab" onclick="setRole('admin')" class="flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-gray-500 hover:bg-gray-100">🛡️ Admin</button>
            </div>

            <form id="loginForm" class="p-8 pt-6 space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                    <input type="email" id="email" required class="input-field w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:border-primary outline-none transition font-medium" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="input-field w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:border-primary outline-none transition font-medium pr-12" placeholder="••••••••">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-navy transition">👁️</button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-primary text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm btn-glow transition-all duration-300 mt-4 flex items-center justify-center gap-2">
                    <span id="loginBtnText">Login Now</span>
                    <span id="loginSpinner" class="hidden">⏳</span>
                </button>
                <p class="text-center text-sm text-gray-500 mt-6">Don't have an account? <a href="register.html" class="text-primary font-bold hover:underline">Register Here</a></p>
            </form>
        </div>
    </div>

    <!-- Load mock backend BEFORE form handler -->
    <script src="mock-auth.js"></script>
    <script>
        let selectedRole = 'student';

        function setRole(role) {
            selectedRole = role;
            const sTab = document.getElementById('studentTab');
            const aTab = document.getElementById('adminTab');
            if (role === 'admin') {
                aTab.className = 'flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-navy text-white shadow';
                sTab.className = 'flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-gray-500 hover:bg-gray-100';
                document.getElementById('email').value = 'admin@champions.com';
                document.getElementById('password').value = 'admin123';
            } else {
                sTab.className = 'flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all bg-navy text-white shadow';
                aTab.className = 'flex-1 py-3 rounded-lg text-xs font-bold uppercase tracking-widest transition-all text-gray-500 hover:bg-gray-100';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            }
        }

        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast-' + type + ' show';
            setTimeout(() => { t.classList.remove('show'); }, 3500);
        }

        // Check if already logged in
        if (window.MockAuth && window.MockAuth.isLoggedIn()) {
            const user = window.MockAuth.getCurrentUser();
            if (user.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            document.getElementById('loginBtnText').textContent = 'Logging in...';
            document.getElementById('loginSpinner').classList.remove('hidden');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('✅ ' + data.message, 'success');
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 800);
                } else {
                    showToast('❌ ' + data.message, 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('❌ Connection error. Please try again.', 'error');
            } finally {
                document.getElementById('loginBtnText').textContent = 'Login Now';
                document.getElementById('loginSpinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
