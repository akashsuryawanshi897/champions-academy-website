<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | THE CHAMPIONS ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF9933',
                        secondary: '#138808',
                        navy: '#000080',
                        dark: '#1A1A2E',
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <link href="index.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-navy p-8 text-center">
            <a href="index.html"><img src="assets/images/logo.png" alt="Logo" class="h-12 mx-auto mb-4"></a>
            <h1 class="text-2xl font-heading font-bold text-white uppercase tracking-wider">Create Account</h1>
            <p class="text-blue-200 text-sm mt-2">Join the elite training academy</p>
        </div>
        <form id="registerForm" class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Full Name</label>
                <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="john@example.com">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Phone Number</label>
                <input type="tel" id="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="+91 00000 00000">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold uppercase tracking-widest text-sm btn-glow transition-all duration-300 mt-4">Create Account</button>
            <p class="text-center text-sm text-gray-500 mt-6">Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Login Now</a></p>
        </form>
    </div>

    <script src="api-config.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${window.API_BASE || ''}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Registration successful!');
                    window.location.href = 'dashboard.html';
                } else {
                    // Specific handling for Database Connection errors (503 Service Unavailable)
                    if (res.status === 503) {
                        alert('⚠️ DATABASE OFFLINE: ' + data.message + '\\n\\nPlease start MongoDB on your system.');
                    } else {
                        alert('Error: ' + data.message);
                    }
                }
            } catch (err) {
                console.error(err);
                alert('Fatal Error: Could not connect to the authentication server. Ensure "node server.js" is running.');
            }
        });
    </script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
